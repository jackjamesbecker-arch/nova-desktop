name: Build NOVA Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate icon files
        run: |
          npm install --save-dev sharp
          node scripts/generate-icons.js

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-Windows-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA — APEX Intelligence
            ### QC-7 Operator Interface

            **Windows Desktop App**

            Download and run the installer below.
            Internet connection required for AI functionality.

            **Access URLs:**
            - NOVA: https://nova-ai-weld-nu.vercel.app
            - APEX: https://apex-site.vercel.app
            - EREBUS: https://erebusqc8.vercel.app
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
